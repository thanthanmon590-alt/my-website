<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 자기소개 페이지</title>
    <style>
        /* CSS 영역 */
        :root {
            --bg-color: #fdfcf0; /* 부드러운 크림색 */
            --card-bg: #ffffff;
            --primary-pastel: #ffebf0; /* 파스텔 핑크 */
            --secondary-pastel: #e3f2fd; /* 파스텔 블루 */
            --accent-pastel: #e8f5e9; /* 파스텔 그린 */
            --text-color: #4a4a4a;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .name {
            font-size: 2.5rem;
            color: #5d5d5d;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        .intro {
            background-color: var(--primary-pastel);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--secondary-pastel);
            display: inline-block;
            padding-bottom: 5px;
        }

        .interests-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .tag {
            background-color: var(--accent-pastel);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .links-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 40px;
        }

        .link-item {
            text-decoration: none;
            color: #666;
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .link-item:hover {
            background-color: var(--secondary-pastel);
            transform: scale(1.05);
        }

        button {
            background-color: #5d5d5d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>나의 자기소개 페이지</h1>
        <h2 class="name">Thanthan Mon</h2>
        
        <div class="intro">
            저는 한국에서 공부하고 있는 유학생입니다.
        </div>

        <div>
            <p class="section-title">관심 분야</p>
            <div class="interests-tags">
                <span class="tag">데이터 분석</span>
                <span class="tag">웹페이지 만들기</span>
                <span class="tag">비즈니스</span>
            </div>
        </div>

        <div>
            <p class="section-title">자주 사용하는 사이트</p>
            <div class="links-container">
                <a href="https://www.google.com" target="_blank" class="link-item">Google</a>
                <a href="https://www.youtube.com" target="_blank" class="link-item">YouTube</a>
                <a href="https://mail.google.com" target="_blank" class="link-item">Gmail</a>
                <a href="https://www.naver.com" target="_blank" class="link-item">Naver</a>
            </div>
        </div>

        <button onclick="showMessage()">인사 나누기</button>
    </div>

    <script>
        // JavaScript 영역
        function showMessage() {
            alert("방문해 주셔서 감사합니다!");
        }
    </script>
</body>
</html>
